<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>T-Beam NTP Server</title>
<style>
:root {
  color-scheme:light;
  --bg:#f6f7f9;
  --ink:#17202a;
  --muted:#5d6875;
  --line:#d8dde5;
  --panel:#fff;
  --accent:#0f766e;
  --accent2:#1d4ed8;
  --warn:#b45309;
  --bad:#b91c1c
}
* {
  box-sizing:border-box
}
body {
  margin:0;
  background:var(--bg);
  color:var(--ink);
  font:14px/1.35 system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif
}
header {
  background:#101820;
  color:#fff;
  padding:18px 20px
}
header h1 {
  font-size:20px;
  margin:0 0 4px
}
header .meta {
  color:#b8c2cc
}
main {
  max-width:1120px;
  margin:0 auto;
  padding:18px;
  display:grid;
  gap:14px
}
section,details.panel {
  background:var(--panel);
  border:1px solid var(--line);
  border-radius:8px;
  padding:14px
}
details.panel>summary {
  cursor:pointer;
  font-weight:800;
  font-size:15px;
  margin:-2px 0 12px;
  list-style:none;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px
}
details.panel>summary::after {
  content:"\25BE";
  color:var(--muted);
  font-size:13px;
  line-height:1
}
details.panel[open]>summary::after {
  content:"\25B4"
}
details.panel>summary::-webkit-details-marker {
  display:none
}
details.panel:not([open])>summary {
  margin-bottom:0
}
.status-panel {
  background:#f7fbff
}
.network-panel {
  background:#f4fbf7
}
.ap-panel {
  background:#fffaf0
}
.timezone-panel {
  background:#f6f0ff
}
.display-panel {
  background:#f0f8ff
}
.power-panel {
  background:#fff4f6
}
.actions-panel {
  background:#f3fbf6
}
h2 {
  font-size:15px;
  margin:0 0 12px
}
.grid {
  display:grid;
  grid-template-columns:repeat(12,1fr);
  gap:10px 12px
}
.span3 {
  grid-column:span 3
}
.span4 {
  grid-column:span 4
}
.span6 {
  grid-column:span 6
}
.span8 {
  grid-column:span 8
}
.span12 {
  grid-column:span 12
}
label {
  display:block;
  font-weight:650;
  margin-bottom:4px
}
input,select,textarea,button {
  width:100%;
  font:inherit;
  border:1px solid var(--line);
  border-radius:6px;
  background:#fff;
  color:var(--ink);
  padding:9px 10px
}
textarea {
  min-height:160px;
  resize:vertical;
  font-family:ui-monospace,SFMono-Regular,Consolas,monospace
}
input[type=checkbox] {
  width:auto;
  margin-right:8px
}
.check {
  display:flex;
  align-items:center;
  min-height:39px;
  color:var(--ink);
  font-weight:650
}
.actions {
  display:flex;
  gap:10px;
  flex-wrap:wrap
}
.actions button {
  width:auto;
  min-width:120px
}
.radio-row {
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  align-items:center;
  min-height:39px
}
.radio-row label {
  display:flex;
  gap:6px;
  align-items:center;
  margin:0;
  font-weight:650
}
.radio-row input {
  width:auto;
  margin:0
}
.offset-row {
  display:grid;
  grid-template-columns:140px 1fr 1fr;
  gap:10px;
  align-items:end
}
.time-mode-body.hidden {
  display:none
}
.battery-strip {
  display:flex;
  align-items:center;
  gap:12px;
  min-height:42px
}
.battery-shell {
  width:58px;
  height:24px;
  border:2px solid var(--line);
  border-radius:5px;
  position:relative;
  background:#fff
}
.battery-shell::after {
  content:"";
  position:absolute;
  right:-7px;
  top:6px;
  width:5px;
  height:10px;
  background:var(--line);
  border-radius:0 2px 2px 0
}
.battery-fill {
  height:100%;
  width:0;
  border-radius:2px;
  background:var(--accent);
  transition:width .2s
}
.battery-fill.warn {
  background:var(--warn)
}
.battery-fill.bad {
  background:var(--bad)
}
.battery-meta {
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  align-items:baseline
}
.battery-meta strong {
  font-size:16px
}
.power-indicator {
  font-weight:800
}
.status-battery-row {
  display:flex;
  align-items:center;
  gap:10px;
  flex-wrap:wrap
}
.status-battery-row .battery-shell {
  flex:0 0 auto
}
.status-battery-percent {
  font-size:16px;
  font-weight:800
}
.status-battery-state {
  font-size:14px;
  font-weight:800;
  white-space:nowrap
}
.charge-bolt {
  color:#f97316;
  font-size:17px;
  font-weight:900;
  line-height:1
}
button {
  background:#e8eef6;
  cursor:pointer;
  font-weight:700
}
button.primary {
  background:var(--accent);
  border-color:var(--accent);
  color:#fff
}
button.secondary {
  background:#eaf0ff;
  border-color:#c6d4ff;
  color:#173b87
}
button.danger {
  background:#fff0f0;
  border-color:#ffc7c7;
  color:var(--bad)
}
.status {
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px
}
.metric {
  border:1px solid var(--line);
  border-radius:8px;
  padding:10px;
  background:#fbfcfd
}
.metric b {
  display:block;
  font-size:12px;
  color:var(--muted);
  margin-bottom:3px
}
.metric span {
  font-size:15px
}
.ok {
  color:var(--accent)
}
.warn {
  color:var(--warn)
}
.bad {
  color:var(--bad)
}
.muted,.hint {
  color:var(--muted);
  font-size:12px
}
.hint {
  margin-top:5px;
  line-height:1.3
}
.hidden {
  display:none
}
.reconnect-screen {
  min-height:100vh;
  display:grid;
  place-items:center;
  padding:24px
}
.reconnect-panel {
  width:min(420px,100%);
  border:1px solid var(--line);
  border-radius:8px;
  background:#fff;
  padding:18px;
  text-align:center
}
.reconnect-panel h1 {
  font-size:20px;
  margin:0 0 8px
}
.reconnect-panel p {
  color:var(--muted);
  margin:0 0 16px
}
@media(max-width:820px) {
  .grid {
    grid-template-columns:1fr
  }
  .span3,.span4,.span6,.span8,.span12 {
    grid-column:span 1
  }
  .status {
    grid-template-columns:1fr 1fr
  }
  .actions button {
    width:100%
  }
  .offset-row {
    grid-template-columns:1fr 1fr 1fr
  }
}
</style>
</head>
<body>
<header>
  <h1 title="GPS/PPS disciplined NTP server status and configuration">T-Beam NTP Server</h1>
  <div class="meta" id="topline">Loading</div>
</header>

<main>
  <details class="panel status-panel" open>
    <summary title="Live clock, GPS, network, power, and memory state">Status</summary>
    <div class="status" id="status"></div>
  </details>

  <details class="panel network-panel">
    <summary title="Settings used when the T-Beam joins an existing WiFi network">Network Client</summary>
    <div class="grid">
      <div class="span12">
        <label>Network mode</label>
        <div class="radio-row">
          <label for="networkModeAp">
            <input name="networkMode" id="networkModeAp" type="radio" value="standaloneAp">
            Standalone AP Mode
          </label>
          <label for="networkModeClient">
            <input name="networkMode" id="networkModeClient" type="radio" value="clientWithApFallback">
            Client Mode with AP Fallback
          </label>
        </div>
      </div>

      <div class="span6">
        <label for="staSsid">Network Client SSID</label>
        <input id="staSsid" maxlength="32" placeholder="Type SSID or choose a scan result">
      </div>
      <div class="span3">
        <label for="staPass">Network Client Password</label>
        <input id="staPass" type="password" maxlength="64">
      </div>
      <div class="span3">
        <label>&nbsp;</label>
        <button class="secondary" id="scanBtn" type="button">Scan</button>
      </div>
      <div class="span12">
        <label for="scanSelect">Scan results</label>
        <select id="scanSelect" disabled>
          <option value="">Scan to find networks</option>
        </select>
      </div>

      <div class="span4">
        <label for="hostname">Hostname</label>
        <input id="hostname" maxlength="31">
      </div>
      <div class="span4 check">
        <input id="staDhcp" type="checkbox">
        Use DHCP
      </div>
      <div class="span4">
        <label for="connectTimeout">Connect timeout seconds</label>
        <input id="connectTimeout" type="number" min="5" max="90">
      </div>

      <div class="span3">
        <label for="staticIp">Static IP</label>
        <input id="staticIp">
      </div>
      <div class="span3">
        <label for="gateway">Gateway</label>
        <input id="gateway">
      </div>
      <div class="span3">
        <label for="subnet">Subnet</label>
        <input id="subnet">
      </div>
      <div class="span3">
        <label for="dns1">DNS 1</label>
        <input id="dns1">
      </div>
    </div>
  </details>

  <details class="panel ap-panel">
    <summary title="Settings used when the T-Beam is its own off-grid WiFi network">Standalone AP</summary>
    <div class="grid">
      <div class="span4">
        <label for="apSsid">AP SSID</label>
        <input id="apSsid" maxlength="32" aria-describedby="apSsidNote">
        <div class="hint" id="apSsidNote">Use {mac} to insert this unit's last six MAC hex digits.</div>
      </div>
      <div class="span4">
        <label for="apPass">AP password</label>
        <input id="apPass" type="password" maxlength="64">
      </div>
      <div class="span4">
        <label for="apSecurity">AP security</label>
        <select id="apSecurity">
          <option value="wpa2">WPA2-Personal</option>
          <option value="wpa2-wpa3">WPA2/WPA3-Personal</option>
          <option value="wpa3">WPA3-Personal</option>
          <option value="wpa-wpa2">WPA/WPA2-Personal legacy</option>
          <option value="open">Open</option>
        </select>
      </div>

      <div class="span2">
        <label for="apChannel">Channel</label>
        <input id="apChannel" type="number" min="1" max="13">
      </div>
      <div class="span2">
        <label for="apMax">Max clients</label>
        <input id="apMax" type="number" min="1" max="10">
      </div>
      <div class="span3">
        <label for="apIp">AP IP</label>
        <input id="apIp">
      </div>
      <div class="span3">
        <label for="apSubnet">AP subnet</label>
        <input id="apSubnet">
      </div>

      <div class="span3 check">
        <input id="opt42" type="checkbox">
        DHCP option 42
      </div>
      <div class="span3 check">
        <input id="dnsAliases" type="checkbox">
        DNS NTP aliases
      </div>
      <div class="span3 check">
        <input id="dnsWildcard" type="checkbox">
        Captive DNS wildcard
      </div>
      <div class="span12">
        <label for="ntpHosts">NTP host aliases</label>
        <textarea id="ntpHosts" spellcheck="false"></textarea>
      </div>
    </div>
  </details>

  <details class="panel timezone-panel">
    <summary title="Local display timezone settings">Local Time Zone</summary>
    <div class="grid">
      <div class="span12">
        <label>Local time mode</label>
        <div class="radio-row">
          <label for="timeModeOffset">
            <input name="timeMode" id="timeModeOffset" type="radio" value="offset">
            UTC offset
          </label>
          <label for="timeModeIana">
            <input name="timeMode" id="timeModeIana" type="radio" value="iana">
            Time zone
          </label>
          <label for="timeModePosix">
            <input name="timeMode" id="timeModePosix" type="radio" value="posix">
            POSIX rule
          </label>
        </div>
      </div>

      <div class="span12 time-mode-body" data-time-mode="offset" id="offsetModeFields">
        <div class="offset-row">
          <div>
            <label for="offsetSign">Offset sign</label>
            <select id="offsetSign">
              <option value="1">UTC+</option>
              <option value="-1">UTC-</option>
            </select>
          </div>
          <div>
            <label for="offsetHours">Offset hours</label>
            <input id="offsetHours" type="number" min="0" max="14">
          </div>
          <div>
            <label for="offsetMinutes">Offset minutes</label>
            <input id="offsetMinutes" type="number" min="0" max="59">
          </div>
        </div>
      </div>
      <div class="span6 time-mode-body" data-time-mode="iana" id="ianaModeFields">
        <label for="ianaTimeZone">Time zone</label>
        <select id="ianaTimeZone">
          <option value="">Loading timezone file</option>
        </select>
      </div>
      <div class="span6 time-mode-body" data-time-mode="posix" id="posixModeFields">
        <label for="posixTimezone">POSIX TZ rule</label>
        <input id="posixTimezone" maxlength="95">
      </div>

      <input id="manualOffset" type="hidden">
      <input id="observeDst" type="hidden">
      <input id="autoOffset" type="hidden">
    </div>
  </details>

  <details class="panel display-panel">
    <summary title="OLED display behavior">Display</summary>
    <div class="grid">
      <div class="span3 check">
        <input id="oledCycle" type="checkbox">
        Cycle OLED screens
      </div>
      <div class="span3">
        <label for="oledCycleSeconds">OLED cycle seconds</label>
        <input id="oledCycleSeconds" type="number" min="2" max="60">
      </div>
      <div class="span3">
        <label for="screenTimeout">Screensaver seconds</label>
        <input id="screenTimeout" type="number" min="0" max="3600">
      </div>
      <div class="span3">
        <label for="portalTimeoutMinutes">Portal timeout minutes</label>
        <input id="portalTimeoutMinutes" type="number" min="0" max="120">
      </div>
    </div>
  </details>

  <details class="panel power-panel">
    <summary title="AXP192 battery and USB power settings">Power</summary>
    <div class="grid">
      <div class="span12 battery-strip" id="batteryMeter">
        <div class="battery-shell">
          <div class="battery-fill" id="batteryFill"></div>
        </div>
        <div class="battery-meta">
          <strong id="batteryPct">--</strong>
          <span class="power-indicator" id="batteryState">Waiting for power data</span>
          <span class="muted" id="batteryDetails"></span>
        </div>
      </div>

      <div class="span3 check">
        <input id="chargeEnabled" type="checkbox">
        Charging enabled
      </div>
      <div class="span3">
        <label for="chargeCurrent">Charge current mA</label>
        <select id="chargeCurrent">
          <option>100</option>
          <option>190</option>
          <option selected>280</option>
          <option>360</option>
          <option>450</option>
          <option>550</option>
          <option>630</option>
          <option>700</option>
        </select>
      </div>
      <div class="span3">
        <label for="chargeVoltage">Charge target mV</label>
        <select id="chargeVoltage">
          <option>4100</option>
          <option>4150</option>
          <option>4200</option>
        </select>
      </div>
      <div class="span3">
        <label for="vbusLimit">VBUS limit mA</label>
        <select id="vbusLimit">
          <option value="100">100</option>
          <option value="500">500</option>
          <option value="0">Off</option>
        </select>
      </div>

      <div class="span3">
        <label for="warnVoltage">Warning mV</label>
        <input id="warnVoltage" type="number" min="3200" max="3900" step="10">
      </div>
      <div class="span3">
        <label for="cutoffVoltage">Cutoff mV</label>
        <input id="cutoffVoltage" type="number" min="3000" max="3600" step="10">
      </div>
      <div class="span3">
        <label for="sysDown">PMU power-down mV</label>
        <input id="sysDown" type="number" min="2600" max="3300" step="100">
      </div>
      <div class="span3">
        <label for="powerKey">Power key off seconds</label>
        <select id="powerKey">
          <option>4</option>
          <option>6</option>
          <option>8</option>
          <option>10</option>
        </select>
      </div>
    </div>
  </details>

  <section class="panel actions-panel">
    <h2 title="Save settings or restart the T-Beam">Actions</h2>
    <div class="actions">
      <button class="primary" id="saveBtn">Save</button>
      <button class="danger" id="rebootBtn">Reboot</button>
      <span class="muted" id="message"></span>
    </div>
  </section>
</main>

<script>
const $ = (id) => document.getElementById(id);

let current = {};
let timeZoneRows = [];
let statusTimer = 0;
let portalTimeoutTimer = 0;
let portalTimeoutMs = 5 * 60 * 1000;
let portalExpired = false;

const tips = {
  topline: 'Live summary of detected hardware revision, network mode, device IP, UTC/local time, and connected AP clients.',
  status: 'Live operational metrics. Each metric tile also has its own tooltip.',
  networkModeAp: 'Start directly as the off-grid access point and skip network-client connection attempts.',
  networkModeClient: 'Try the configured network-client SSID first, then fall back to standalone AP mode if connection fails or is later lost.',
  staSsid: 'SSID of the existing WiFi network to join when Client Mode with AP Fallback is selected. Type hidden SSIDs here, or choose a scanned network below.',
  scanBtn: 'Scan nearby WiFi networks and refresh Scan results. Scanning does not overwrite the SSID field.',
  staPass: 'Password for the selected network-client WiFi network. It is saved only when you press Save.',
  scanSelect: 'Nearby WiFi networks discovered by the last scan. Choosing one copies that SSID into the Network Client SSID field.',
  hostname: 'Hostname used on the LAN and for mDNS services. Keep it short, unique, and DNS-safe.',
  staDhcp: 'Use the router DHCP lease in LAN mode. Turn this off only when you want a fixed IPv4 address.',
  connectTimeout: 'How long to try joining home WiFi before falling back to standalone AP mode.',
  staticIp: 'Fixed IPv4 address to use when DHCP is disabled.',
  gateway: 'IPv4 gateway for static LAN mode. Usually the router address.',
  subnet: 'Subnet mask for static LAN mode, normally 255.255.255.0 on small networks.',
  dns1: 'DNS server used by the T-Beam in LAN mode when static addressing is selected.',
  apSsid: 'Standalone AP network name. The literal token {mac} is replaced with the last six MAC hex digits for this unit before the AP starts.',
  apSsidNote: 'Shows the AP SSID after {mac} expansion, using the value reported by the firmware.',
  apPass: 'Standalone AP password. Default is tbeam-ntp. Secure AP modes require at least 8 characters.',
  apSecurity: 'Standalone AP security mode. WEP is not offered because ESP32 SoftAP mode does not support WEP.',
  apChannel: '2.4 GHz WiFi channel for standalone AP mode. Use 1, 6, or 11 when avoiding overlap.',
  apMax: 'Maximum SoftAP stations allowed. Higher values increase management and buffer pressure.',
  apIp: 'IPv4 address of the T-Beam in standalone AP mode. DHCP, DNS, portal, and NTP use this address.',
  apSubnet: 'Subnet mask handed to standalone AP clients by the DHCP server.',
  opt42: 'Advertise the T-Beam AP IP as the NTP server with DHCP option 42.',
  dnsAliases: 'Answer configured NTP hostnames with the T-Beam AP IP so clients already pointed at public time servers still work off-grid.',
  dnsWildcard: 'Answer other DNS names with the T-Beam AP IP for captive portal discovery and easier onboarding.',
  ntpHosts: 'One NTP hostname per line. These names are answered locally by DNS in standalone AP mode.',
  timeModeOffset: 'Use a fixed UTC offset entered as hours and minutes. This mode does not apply daylight-saving changes.',
  timeModeIana: 'Choose a current timezone preset loaded from the editable timezone file.',
  timeModePosix: 'Use the POSIX TZ rule string exactly as entered below.',
  offsetModeFields: 'Fixed local offset from UTC, entered without doing minute math by hand.',
  ianaModeFields: 'Preset timezone selector for current daylight-saving behavior.',
  posixModeFields: 'Manual POSIX timezone rule entry for advanced or custom local-time behavior.',
  offsetSign: 'Direction of the local offset from UTC. UTC- is used west of Greenwich, such as US time zones.',
  offsetHours: 'Hour portion of the fixed UTC offset. The firmware converts this to minutes internally.',
  offsetMinutes: 'Minute portion of the fixed UTC offset. Use values like 30 or 45 for half-hour and quarter-hour zones.',
  ianaTimeZone: 'Timezone preset name. If the timezone file is removed, this mode falls back to the POSIX rule field.',
  posixTimezone: 'Manual POSIX timezone rule for local display time. Example: PST8PDT,M3.2.0/2,M11.1.0/2.',
  observeDst: 'Compatibility field retained for older saved settings.',
  autoOffset: 'Compatibility field retained for older saved settings.',
  manualOffset: 'Internal fixed UTC offset in minutes, generated from the hour/minute controls.',
  batteryMeter: 'Live battery gauge from the AXP192. Shows USB-only operation cleanly when no battery is installed.',
  batteryPct: 'Battery charge estimate from the AXP192 fuel gauge.',
  batteryState: 'Charging, discharging, idle, USB-only, or PMU-offline state.',
  batteryDetails: 'Battery voltage/current detail and USB input telemetry when available.',
  chargeEnabled: 'Allow AXP192 battery charging using the configured current and voltage limits.',
  chargeCurrent: 'Li-Ion charge current limit. Conservative values reduce heat and battery stress.',
  chargeVoltage: 'Li-Ion charge termination voltage. 4100 mV is conservative; 4200 mV maximizes capacity.',
  vbusLimit: 'USB/VBUS input current limit. Use 500 mA for normal USB ports, 100 mA for weak sources, Off to disable the limiter.',
  warnVoltage: 'Battery voltage that marks the power state as warning while discharging.',
  cutoffVoltage: 'Battery voltage that requests PMU shutdown while discharging after the debounce interval.',
  sysDown: 'AXP192 system power-down threshold. Keep below the battery cutoff setting.',
  powerKey: 'AXP192 long-press duration for PMU power-off behavior.',
  oledCycle: 'Automatically rotate OLED status screens.',
  oledCycleSeconds: 'Seconds each OLED screen remains visible while auto-cycle is enabled.',
  screenTimeout: 'Seconds of no display activity before the OLED turns off. Use 0 to disable the screensaver.',
  portalTimeoutMinutes: 'Minutes of no portal interaction before this page stops polling and shows a reconnect button. Use 0 to disable.',
  saveBtn: 'Write the displayed settings to LittleFS. The firmware avoids flash writes until this is pressed.',
  rebootBtn: 'Restart the T-Beam. Network mode and AP settings take effect cleanly after reboot.',
  message: 'Save, scan, and reboot status messages appear here.'
};

const metricTips = {
  Mode: 'Current network mode: AP for standalone service or STA for LAN client mode.',
  Version: 'Firmware version running on this T-Beam.',
  IP: 'IPv4 address currently serving the portal and NTP.',
  UTC: 'GPS-derived UTC time. NTP uses UTC and ignores local timezone settings.',
  Local: 'Display-only local time after POSIX TZ/DST or fallback offset handling.',
  TZ: 'Timezone abbreviation, daylight-saving state, or numeric fallback offset.',
  PPS: 'Whether recent GPS PPS edges are disciplining the firmware clock.',
  GPS: 'Current satellite count reported by the GPS receiver.',
  'Maidenhead / Grid Square': 'Six-character Maidenhead grid locator calculated from the current GPS fix.',
  Location: 'Current GPS latitude and longitude when a fix is fresh.',
  Altitude: 'GPS altitude in meters when available.',
  'DOP (unitless)': 'Dilution of precision reported by the GPS receiver. Lower is better; this value is unitless.',
  Battery: 'AXP192 battery presence, voltage, and charge/discharge current.',
  VBUS: 'USB/VBUS voltage and current reported by the AXP192.',
  'Request count': 'NTP requests, NTP responses in parentheses, and DNS query count.'
};

function escAttr(value) {
  return String(value ?? '')
    .replace(/&/g, '&amp;')
    .replace(/"/g, '&quot;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function metric(key, value, cls = '', tip = '') {
  const title = escAttr(tip || metricTips[key] || key);
  return `<div class="metric" title="${title}"><b>${key}</b><span class="${cls}">${value ?? ''}</span></div>`;
}

function applyTooltips() {
  Object.keys(tips).forEach((id) => {
    const element = $(id);
    if (!element) return;

    element.title = tips[id];
    const label = document.querySelector(`label[for="${id}"]`);
    if (label) label.title = tips[id];

    const checkWrapper = element.closest('.check');
    if (checkWrapper) checkWrapper.title = tips[id];
  });
}

function intValue(value, fallback = 0) {
  const parsed = Number(value);
  return Number.isFinite(parsed) ? parsed : fallback;
}

function valueOr(value, fallback = '') {
  if (value === undefined || value === null) return fallback;
  return value;
}

function textOr(value, fallback = '') {
  if (value) return value;
  return fallback;
}

function arrayOrEmpty(value) {
  return Array.isArray(value) ? value : [];
}

function inferredNetworkMode(settings) {
  if (settings.networkMode) return settings.networkMode;
  return valueOr(settings.wifi, {}).ssid ? 'clientWithApFallback' : 'standaloneAp';
}

function inferredTimeMode(time) {
  if (time.mode) return time.mode;
  return time.observeDst === false ? 'offset' : 'posix';
}

function offsetLabel(minutes) {
  const sign = minutes >= 0 ? '+' : '-';
  const absolute = Math.abs(minutes || 0);
  const hours = String(Math.floor(absolute / 60)).padStart(2, '0');
  const mins = String(absolute % 60).padStart(2, '0');
  return `UTC${sign}${hours}:${mins}`;
}

async function getJson(url, options) {
  const response = await fetch(url, options);
  if (!response.ok) throw new Error(await response.text());
  return response.json();
}

function setMsg(text, cls = '') {
  const element = $('message');
  if (!element) return;
  element.textContent = text;
  element.className = `muted ${cls}`;
}

function resetPortalTimer() {
  if (portalExpired) return;
  if (portalTimeoutTimer) clearTimeout(portalTimeoutTimer);
  if (portalTimeoutMs > 0) {
    portalTimeoutTimer = setTimeout(expirePortal, portalTimeoutMs);
  }
}

function configurePortalTimeout(displaySettings = {}) {
  const seconds = Math.max(0, intValue(displaySettings.portalTimeoutSec, 300));
  portalTimeoutMs = seconds * 1000;
  resetPortalTimer();
}

function expirePortal() {
  portalExpired = true;
  if (statusTimer) clearInterval(statusTimer);
  if (portalTimeoutTimer) clearTimeout(portalTimeoutTimer);

  document.body.innerHTML = `
    <main class="reconnect-screen">
      <section class="reconnect-panel">
        <h1>T-Beam NTP Server</h1>
        <p>Portal session paused to reduce WiFi airtime.</p>
        <button class="primary" id="reconnectBtn" type="button">Reconnect</button>
      </section>
    </main>`;

  $('reconnectBtn').onclick = () => window.location.reload();
}

function installPortalActivityWatch() {
  ['click', 'keydown', 'input', 'change', 'touchstart', 'pointerdown'].forEach((eventName) => {
    document.addEventListener(eventName, resetPortalTimer, { passive: true });
  });
}

function setOffsetControls(minutes) {
  const offset = Number(minutes) || 0;
  $('offsetSign').value = offset < 0 ? '-1' : '1';
  $('offsetHours').value = Math.floor(Math.abs(offset) / 60);
  $('offsetMinutes').value = Math.abs(offset) % 60;
  $('manualOffset').value = offset;
}

function offsetFromControls() {
  const sign = intValue($('offsetSign').value, 1);
  const hours = Math.min(14, Math.max(0, intValue($('offsetHours').value, 0)));
  const minutes = Math.min(59, Math.max(0, intValue($('offsetMinutes').value, 0)));
  return sign * ((hours * 60) + minutes);
}

function getNetworkMode() {
  const selected = document.querySelector('input[name="networkMode"]:checked');
  return selected ? selected.value : 'standaloneAp';
}

function setNetworkMode(mode) {
  const id = mode === 'clientWithApFallback' ? 'networkModeClient' : 'networkModeAp';
  ($(id) || $('networkModeAp')).checked = true;
}

function getTimeMode() {
  const selected = document.querySelector('input[name="timeMode"]:checked');
  return selected ? selected.value : 'iana';
}

function updateTimeModeVisibility() {
  const mode = getTimeMode();
  document.querySelectorAll('.time-mode-body').forEach((element) => {
    element.classList.toggle('hidden', element.dataset.timeMode !== mode);
  });
}

function wireTimeModeControls() {
  document.querySelectorAll('input[name="timeMode"]').forEach((element) => {
    element.onchange = updateTimeModeVisibility;
  });
}

function setTimeMode(mode) {
  const suffix = String(mode || 'iana').replace(/^./, (character) => character.toUpperCase());
  const element = $(`timeMode${suffix}`) || $('timeModeIana');
  element.checked = true;
  updateTimeModeVisibility();
}

function populateTimeZones(selected) {
  const select = $('ianaTimeZone');
  select.innerHTML = '';

  if (!timeZoneRows.length) {
    const option = document.createElement('option');
    option.value = selected || '';
    option.textContent = 'Timezone file missing';
    select.appendChild(option);
    select.disabled = true;
    return;
  }

  select.disabled = false;
  timeZoneRows.forEach((zone) => {
    const option = document.createElement('option');
    option.value = zone.name;
    option.textContent = zone.name;
    select.appendChild(option);
  });

  select.value = selected || 'America/Los_Angeles';
  if (select.value !== selected && selected) {
    const option = document.createElement('option');
    option.value = selected;
    option.textContent = `${selected} (not in file)`;
    select.insertBefore(option, select.firstChild);
    select.value = selected;
  }
}

async function loadTimeZones() {
  try {
    const response = await fetch('/api/timezones');
    if (!response.ok) throw new Error('missing');

    const text = await response.text();
    timeZoneRows = text
      .split(/\r?\n/)
      .map((row) => row.trim())
      .filter((row) => row && !row.startsWith('#'))
      .map((row) => {
        const parts = row.split('\t');
        return { name: parts[0], posix: parts.slice(1).join('\t') };
      })
      .filter((row) => row.name && row.posix);
  } catch (error) {
    timeZoneRows = [];
  }
}

function setScanPrompt(text, disabled = true) {
  const select = $('scanSelect');
  if (!select) return;

  select.innerHTML = '';
  const option = document.createElement('option');
  option.value = '';
  option.textContent = text;
  option.selected = true;
  select.appendChild(option);
  select.disabled = disabled;
}

function scanOptionLabel(network) {
  return `${network.ssid} (${network.rssi} dBm, ch ${network.channel}, ${network.auth || 'unknown'})`;
}

function updateApSecurityUi() {
  const open = $('apSecurity').value === 'open';
  $('apPass').disabled = open;
  $('apPass').placeholder = open ? 'not used in open mode' : '';
}

function batteryPercentValue(power) {
  const raw = Number(power && power.batteryPercent);
  return Number.isFinite(raw) && raw >= 0 ? Math.min(100, Math.max(0, Math.round(raw))) : null;
}

function batteryFillClass(power, percent) {
  return `battery-fill ${(power && power.warning) || percent <= 10 ? 'bad' : percent <= 25 ? 'warn' : ''}`;
}

function batteryMeterElements() {
  const elements = {
    fill: $('batteryFill'),
    percentText: $('batteryPct'),
    state: $('batteryState'),
    details: $('batteryDetails')
  };
  return Object.values(elements).every(Boolean) ? elements : null;
}

function renderBatteryMeterOffline(elements) {
  elements.fill.style.width = '0%';
  elements.fill.className = 'battery-fill bad';
  elements.percentText.textContent = '--';
  elements.state.textContent = 'PMU offline';
  elements.details.textContent = 'No AXP192 telemetry';
}

function renderBatteryMeterUsbOnly(power, elements) {
  elements.fill.style.width = '0%';
  elements.fill.className = 'battery-fill';
  elements.percentText.textContent = 'USB';
  elements.state.textContent = usbPowerStateText(power);
  elements.details.textContent = usbPowerDetails(power);
}

function usbPowerStateText(power) {
  return power.vbusPresent ? '\u26A1 USB power' : 'No battery';
}

function usbPowerDetails(power) {
  if (!power.vbusPresent) return 'Battery not detected';
  return `${Number(power.vbusMv || 0).toFixed(0)} mV ${Number(power.vbusCurrentMa || 0).toFixed(0)} mA VBUS`;
}

function batteryMeterStateText(power) {
  if (power.charging) return '\u26A1 Charging';
  if (power.discharging) return '\u25BE Discharging';
  return 'Idle';
}

function renderBatteryMeterPresent(power, elements) {
  const percent = batteryPercentValue(power);
  const shown = percent === null ? 0 : percent;
  elements.fill.style.width = `${shown}%`;
  elements.fill.className = batteryFillClass(power, shown);
  elements.percentText.textContent = percent === null ? '--' : `${percent}%`;
  elements.state.textContent = batteryMeterStateText(power);
  elements.details.textContent = `${Number(power.batteryMv || 0).toFixed(0)} mV ${Number(power.batteryCurrentMa || 0).toFixed(0)} mA`;
}

function updateBatteryMeter(power) {
  const elements = batteryMeterElements();
  if (!elements) return;
  if (!power || !power.online) return renderBatteryMeterOffline(elements);
  if (!power.batteryPresent) return renderBatteryMeterUsbOnly(power, elements);
  renderBatteryMeterPresent(power, elements);
}

function statusBatteryMetric(power) {
  const title = 'Compact battery charge indicator. Lightning means charging.';
  if (!power || !power.online) {
    return statusBatteryMetricOffline(title);
  }

  if (!power.batteryPresent) {
    return statusBatteryMetricUsbOnly(title);
  }

  return statusBatteryMetricPresent(title, power);
}

function statusBatteryMetricOffline(title) {
  return `<div class="metric" title="${title}"><b>Battery</b><span class="bad">PMU offline</span></div>`;
}

function statusBatteryMetricUsbOnly(title) {
  return `<div class="metric" title="${title}"><b>Battery</b><div class="status-battery-row"><div class="battery-shell"><div class="battery-fill" style="width:0%"></div></div><span class="status-battery-percent">USB</span></div></div>`;
}

function statusBatteryStateHtml(power) {
  if (power.charging) {
    return '<span class="charge-bolt" title="Charging">\u26A1</span><span class="status-battery-state">Charging</span>';
  }
  if (power.discharging) {
    return '<span class="status-battery-state">Discharging</span>';
  }
  return '<span class="status-battery-state">Idle</span>';
}

function statusBatteryMetricPresent(title, power) {
  const percent = batteryPercentValue(power);
  const shown = percent === null ? 0 : percent;
  const label = percent === null ? '--' : `${percent}%`;
  const state = statusBatteryStateHtml(power);

  return `<div class="metric" title="${title}"><b>Battery</b><div class="status-battery-row"><div class="battery-shell"><div class="${batteryFillClass(power, shown)}" style="width:${shown}%"></div></div><span class="status-battery-percent">${label}</span>${state}</div></div>`;
}

function fillNetworkSettings(settings) {
  const wifi = valueOr(settings.wifi, {});
  $('hostname').value = valueOr(settings.hostname);
  setNetworkMode(inferredNetworkMode(settings));
  $('staSsid').value = valueOr(wifi.ssid);
  $('staPass').value = valueOr(wifi.password);
  $('staDhcp').checked = !!wifi.dhcp;
  $('staticIp').value = valueOr(wifi.staticIp);
  $('gateway').value = valueOr(wifi.gateway);
  $('subnet').value = valueOr(wifi.subnet);
  $('dns1').value = valueOr(wifi.dns1);
  $('connectTimeout').value = valueOr(wifi.connectTimeoutSec, 20);
}

function fillApSettings(settings) {
  const ap = valueOr(settings.ap, {});
  $('apSsid').value = valueOr(ap.ssid);
  $('apPass').value = valueOr(ap.password);
  $('apSecurity').value = textOr(ap.security, 'wpa2');
  updateApSecurityUi();
  $('apIp').value = valueOr(ap.ip);
  $('apSubnet').value = valueOr(ap.subnet);
  $('apChannel').value = valueOr(ap.channel, 6);
  $('apMax').value = valueOr(ap.maxClients, 8);

  const expandedSsid = textOr(ap.expandedSsid, valueOr(ap.ssid));
  $('apSsidNote').textContent = `Use {mac} to insert this unit's last six MAC hex digits. Current AP SSID: ${expandedSsid}.`;
}

function fillStandaloneSettings(settings) {
  const standalone = valueOr(settings.standalone, {});
  $('opt42').checked = !!standalone.dhcpOption42;
  $('dnsAliases').checked = !!standalone.dnsNtpAliases;
  $('dnsWildcard').checked = !!standalone.dnsWildcardCaptive;
  $('ntpHosts').value = arrayOrEmpty(standalone.ntpHosts).join('\n');
}

function fillTimeSettings(settings) {
  const time = valueOr(settings.time, {});
  setTimeMode(inferredTimeMode(time));
  setOffsetControls(valueOr(time.manualOffsetMinutes, 0));
  populateTimeZones(textOr(time.ianaTimeZone, 'America/Los_Angeles'));
  $('posixTimezone').value = textOr(time.posixTimezone, 'PST8PDT,M3.2.0/2,M11.1.0/2');
  $('observeDst').value = '';
  $('autoOffset').value = '';
}

function fillPowerSettings(settings) {
  const power = valueOr(settings.power, {});
  $('chargeEnabled').checked = !!power.chargeEnabled;
  $('chargeCurrent').value = valueOr(power.chargeCurrentMa, 100);
  $('chargeVoltage').value = valueOr(power.chargeTargetMv, 4100);
  $('vbusLimit').value = valueOr(power.vbusCurrentLimitMa, 500);
  $('warnVoltage').value = valueOr(power.warningVoltageMv, 3500);
  $('cutoffVoltage').value = valueOr(power.cutoffVoltageMv, 3300);
  $('sysDown').value = valueOr(power.sysPowerDownMv, 3000);
  $('powerKey').value = valueOr(power.powerKeyOffSeconds, 6);
}

function fillDisplaySettings(settings) {
  const display = valueOr(settings.display, {});
  $('oledCycle').checked = display.autoCycle !== false;
  $('oledCycleSeconds').value = valueOr(display.cycleSeconds, 5);
  $('screenTimeout').value = valueOr(display.screensaverTimeoutSec, 300);
  $('portalTimeoutMinutes').value = Math.round(valueOr(display.portalTimeoutSec, 300) / 60);
}

function fillSettings(settings) {
  current = settings;
  fillNetworkSettings(settings);
  fillApSettings(settings);
  fillStandaloneSettings(settings);
  fillTimeSettings(settings);
  fillPowerSettings(settings);
  fillDisplaySettings(settings);
}

function readSettings() {
  const mode = getTimeMode();
  const offset = offsetFromControls();
  const portalTimeoutSec = Math.max(0, Math.round(intValue($('portalTimeoutMinutes').value, 0) * 60));

  return {
    networkMode: getNetworkMode(),
    hostname: $('hostname').value,
    wifi: {
      ssid: $('staSsid').value,
      password: $('staPass').value,
      dhcp: $('staDhcp').checked,
      staticIp: $('staticIp').value,
      gateway: $('gateway').value,
      subnet: $('subnet').value,
      dns1: $('dns1').value,
      dns2: (current.wifi && current.wifi.dns2) || '1.1.1.1',
      connectTimeoutSec: +$('connectTimeout').value
    },
    ap: {
      ssid: $('apSsid').value,
      password: $('apPass').value,
      security: $('apSecurity').value,
      ip: $('apIp').value,
      subnet: $('apSubnet').value,
      channel: +$('apChannel').value,
      maxClients: +$('apMax').value
    },
    standalone: {
      dhcpOption42: $('opt42').checked,
      dnsNtpAliases: $('dnsAliases').checked,
      dnsWildcardCaptive: $('dnsWildcard').checked,
      ntpHosts: $('ntpHosts').value.split(/\r?\n/).map((line) => line.trim()).filter(Boolean)
    },
    time: {
      mode,
      ianaTimeZone: $('ianaTimeZone').value,
      posixTimezone: $('posixTimezone').value.trim(),
      autoLocalOffset: false,
      observeDst: mode !== 'offset',
      manualOffsetMinutes: offset
    },
    display: {
      autoCycle: $('oledCycle').checked,
      cycleSeconds: +$('oledCycleSeconds').value,
      screensaverTimeoutSec: +$('screenTimeout').value,
      portalTimeoutSec
    },
    power: {
      chargeEnabled: $('chargeEnabled').checked,
      chargeCurrentMa: +$('chargeCurrent').value,
      chargeTargetMv: +$('chargeVoltage').value,
      vbusCurrentLimitMa: +$('vbusLimit').value,
      warningVoltageMv: +$('warnVoltage').value,
      cutoffVoltageMv: +$('cutoffVoltage').value,
      sysPowerDownMv: +$('sysDown').value,
      powerKeyOffSeconds: +$('powerKey').value
    }
  };
}

function gpsStatusClass(gps) {
  if (gps && gps.fix) return 'ok';
  return gps && gps.seen ? 'warn' : 'bad';
}

function powerStatusClass(power) {
  if (!power || !power.online) return 'warn';
  return power.warning ? 'warn' : 'ok';
}

function syncedStatusClass(clock) {
  return clock && clock.synced ? 'ok' : 'bad';
}

function statusTimezone(status) {
  if (status.timeZone) {
    return `${status.timeZone} ${status.dstActive ? 'DST' : 'STD'}`;
  }
  return offsetLabel(status.localOffsetMinutes);
}

function formatSatelliteCount(gps) {
  const count = Number(gps && gps.sats) || 0;
  return `${count} ${count === 1 ? 'Satellite' : 'Satellites'}`;
}

function formatLocation(gps) {
  return gps && gps.fix ? `${gps.lat.toFixed(6)}, ${gps.lon.toFixed(6)}` : 'no fix';
}

function formatAltitude(gps) {
  return gps && gps.fix ? `${gps.alt.toFixed(1)} m` : '';
}

function formatDop(gps) {
  return gps && gps.dop ? gps.dop : '';
}

function ntpResponseTotal(status) {
  const direct = Number(status.ntpResponses);
  if (Number.isFinite(direct)) return direct;

  const requests = Number(status.ntpRequests) || 0;
  const suppressed = Number(status.ntpSuppressed) || 0;
  return Math.max(0, requests - suppressed);
}

function formatRequestCount(status) {
  const requests = Number(status.ntpRequests) || 0;
  const responses = ntpResponseTotal(status);
  const dns = Number(status.dnsQueries) || 0;
  return `NTP: ${requests}(${responses}) DNS: ${dns}`;
}

function formatBatteryText(power) {
  if (!power || !power.online) return 'PMU offline';
  if (!power.batteryPresent) return 'no battery';
  return `${power.batteryMv} mV ${Number(power.batteryCurrentMa || 0).toFixed(0)} mA`;
}

function formatVbusText(power) {
  return power && power.online ? `${power.vbusMv} mV ${Number(power.vbusCurrentMa || 0).toFixed(0)} mA` : '';
}

function ppsText(clock) {
  return clock.pps ? 'locked' : 'waiting';
}

function ppsClass(clock) {
  return clock.pps ? 'ok' : 'warn';
}

function identityMetricRows(status) {
  return [
    ['Mode', status.mode],
    ['Version', status.version || ''],
    ['IP', status.ip]
  ];
}

function clockMetricRows(status, clock, clockClass) {
  return [
    ['UTC', status.utc || 'not synced', clockClass],
    ['Local', status.local || 'not synced', clockClass],
    ['TZ', statusTimezone(status)],
    ['PPS', ppsText(clock), ppsClass(clock)]
  ];
}

function gpsMetricRows(gps, gpsClass) {
  return [
    ['GPS', formatSatelliteCount(gps), gpsClass],
    ['Location', formatLocation(gps)],
    ['Altitude', formatAltitude(gps)],
    ['DOP (unitless)', formatDop(gps)],
    ['Maidenhead / Grid Square', gps.grid || '--', gpsClass]
  ];
}

function powerMetricRows(power) {
  return [
    ['Battery', formatBatteryText(power), powerStatusClass(power)],
    ['VBUS', formatVbusText(power)]
  ];
}

function statusMetricRows(status) {
  const gps = valueOr(status.gps, {});
  const clock = valueOr(status.clock, {});
  const power = valueOr(status.power, {});
  return []
    .concat(identityMetricRows(status))
    .concat(clockMetricRows(status, clock, syncedStatusClass(clock)))
    .concat(gpsMetricRows(gps, gpsStatusClass(gps)))
    .concat(powerMetricRows(power))
    .concat([['Request count', formatRequestCount(status)]]);
}

function updateTopline(status) {
  const hardware = status.hardwareRevision || 'T-Beam unknown';
  $('topline').textContent = `${hardware} | ${status.mode} ${status.ip} | UTC ${status.utc || 'not synced'} | Local ${status.local || 'not synced'} | clients ${status.clients}`;
}

function renderStatus(status) {
  const rows = statusMetricRows(status)
    .map(([key, value, cls]) => metric(key, value, cls))
    .join('');
  $('status').innerHTML = rows + statusBatteryMetric(status.power || {});
}

function updateStatusPage(status) {
  updateBatteryMeter(status.power);
  updateTopline(status);
  renderStatus(status);
}

async function refreshStatus() {
  if (portalExpired) return;

  try {
    const status = await getJson('/api/status');
    updateStatusPage(status);
  } catch (error) {
    setMsg(error.message, 'bad');
  }
}

async function saveSettings() {
  try {
    setMsg('Saving');
    const payload = readSettings();
    await getJson('/api/save', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
    configurePortalTimeout(payload.display);
    setMsg('Saved. Reboot to apply network changes.', 'ok');
  } catch (error) {
    setMsg(error.message, 'bad');
  }
}

async function rebootDevice() {
  if (!confirm('Reboot now?')) return;
  await fetch('/api/reboot', { method: 'POST' });
  setMsg('Rebooting');
}

function onScanSelectionChanged() {
  const select = $('scanSelect');
  if (!select.value) return;

  $('staSsid').value = select.value;
  setMsg(`Selected ${select.value}. Press Save to store it.`, 'ok');
}

function sortedScanNetworks(scan) {
  return (scan.networks || [])
    .slice()
    .sort((a, b) => (Number(b.rssi) || -999) - (Number(a.rssi) || -999));
}

function appendScanPrompt(select, namedCount) {
  const prompt = document.createElement('option');
  prompt.value = '';
  prompt.textContent = namedCount ? `Select a network - ${namedCount} found` : 'No named networks found';
  prompt.selected = true;
  select.appendChild(prompt);
}

function appendScanNetworks(select, networks) {
  networks.forEach((network) => {
    const option = document.createElement('option');
    option.value = network.ssid;
    option.textContent = scanOptionLabel(network);
    select.appendChild(option);
  });
}

function populateScanResults(scan) {
  const networks = sortedScanNetworks(scan);
  const named = networks.filter((network) => network.ssid);
  const select = $('scanSelect');

  select.innerHTML = '';
  appendScanPrompt(select, named.length);
  appendScanNetworks(select, named);
  select.disabled = !named.length;
  $('staSsid').placeholder = named.length ? 'Type SSID or choose a scan result' : 'Type hidden SSID manually';

  return { namedCount: named.length, shownCount: networks.length };
}

function showScanResultMessage(scan, result) {
  if (!result.namedCount) {
    setMsg('No named networks found. Type a hidden SSID manually if needed.', 'warn');
    return;
  }

  const suffix = scan.count > result.shownCount ? ' (showing strongest 40)' : '';
  setMsg(`Found ${result.namedCount} named networks${suffix}. Choose one or type a hidden SSID.`, 'ok');
}

async function scanNetworks() {
  const button = $('scanBtn');
  try {
    button.disabled = true;
    button.textContent = 'Scanning';
    setScanPrompt('Scanning...', true);
    setMsg('Scanning');

    const scan = await getJson('/api/scan');
    if (scan.error) throw new Error(scan.error);

    const result = populateScanResults(scan);
    showScanResultMessage(scan, result);
  } catch (error) {
    setScanPrompt('Scan failed', true);
    setMsg(error.message, 'bad');
  } finally {
    button.disabled = false;
    button.textContent = 'Scan';
  }
}

function wireActions() {
  $('saveBtn').onclick = saveSettings;
  $('rebootBtn').onclick = rebootDevice;
  $('scanSelect').onchange = onScanSelectionChanged;
  $('scanBtn').onclick = scanNetworks;
}

async function load() {
  installPortalActivityWatch();
  resetPortalTimer();
  applyTooltips();
  wireTimeModeControls();
  wireActions();
  $('apSecurity').onchange = updateApSecurityUi;

  await loadTimeZones();
  const settings = await getJson('/api/settings');
  fillSettings(settings);
  configurePortalTimeout(settings.display || {});

  refreshStatus();
  statusTimer = setInterval(refreshStatus, 2000);
}

load();
</script>
</body>
</html>
